<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Explore India Travels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <h2>Explore India Travels</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="contact-section">
        <h1>Get In Touch With Us</h1>
        <p class="section-subtitle">Plan your dream vacation today. Fill out the form below and our team will reach out shortly.</p>

        <div class="contact-container">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="package">Select Destination / Package</label>
                    <select id="package" name="package">
                        <option value="general">General Inquiry</option>
                        <option value="golden-triangle">Golden Triangle Tour</option>
                        <option value="kerala">Kerala Backwaters</option>
                        <option value="goa">Goa Beach Escape</option>
                        <option value="ladakh">Leh Ladakh Expedition</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us about your travel plans..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Explore India Travels. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
